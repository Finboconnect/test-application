apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-application
  template:
    metadata:
      labels:
        app: test-application
    spec:
      containers:
        - name: test-application
          image: REPLACE_WITH_ECR_IMAGE
          ports:
            - containerPort: 8080
