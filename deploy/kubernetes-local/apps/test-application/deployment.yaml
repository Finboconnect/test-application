apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-application
  template:
    metadata:
      labels:
        app: test-application
    spec:
      containers:
        - name: test-application
          image: 198737698086.dkr.ecr.eu-west-2.amazonaws.com/test-application:dev-you-001
          ports:
            - containerPort: 8080
